version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: car_price_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: car_prediction_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - car_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: car_price_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpassword
      - MYSQL_DATABASE=car_prediction_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - car_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: car_price_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - car_network

volumes:
  mysql_data:

networks:
  car_network:
    driver: bridge
